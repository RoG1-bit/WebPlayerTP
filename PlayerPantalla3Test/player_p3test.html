<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pantalla 3 test </title>
    <style>
      /* Fondo de seguridad: Muestra el logo corporativo si hay lentitud en la red */
      body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #1a1a1a;
        background-image: url("https://pub-29979a9319a64459816c0aa2b9d4d11c.r2.dev/fondo.jpg");
        background-position: center; background-repeat: no-repeat; background-size: contain;
      }
      /* Reproductor optimizado para sobreponerse al fondo */
      video { width: 100%; height: 100%; object-fit: cover; position: absolute; z-index: 5; background-color: transparent; }
    </style>
  </head>
  <body>
    <video id="videoPlayer" muted playsinline loop preload="auto"></video>

    <script>
      // ==========================================
      // 1. CONFIGURACIÓN DEL SISTEMA
      // ==========================================
      const URL_PLAYLIST = "https://pub-29979a9319a64459816c0aa2b9d4d11c.r2.dev/pantalla3test/playlist_p3test.json";
      const videoElement = document.getElementById("videoPlayer");

      // Identificador de la sucursal actual (leído desde la URL)
      const urlParams = new URLSearchParams(window.location.search);
      const sucursalActual = urlParams.get("sucursal") ? urlParams.get("sucursal").toLowerCase() : "default";

      let currentUrl = ""; 
      let intentandoReproducir = false; 

      // ==========================================
      // 2. NÚCLEO DE PROTECCIÓN Y REPRODUCCIÓN
      // ==========================================
      function intentarReproducir() {
        if (intentandoReproducir) return; 
        intentandoReproducir = true;
        videoElement.play().then(() => { intentandoReproducir = false; }).catch(() => { intentandoReproducir = false; });
      }

      // El reinicio seguro: Limpia la memoria de la TV y evita que el procesador colapse
      function lavarRAM() {
        videoElement.pause();
        videoElement.removeAttribute("src");
        videoElement.load();
        currentUrl = "";

        if (navigator.onLine) {
          setTimeout(() => {
            const params = new URLSearchParams(window.location.search);
            params.set("r", new Date().getTime());
            window.location.replace(window.location.origin + window.location.pathname + "?" + params.toString());
          }, 500);
        }
      }

      // Sistema de Auto-Rescate Universal (A prueba de Samsung, LG y Android)
      videoElement.addEventListener("error", () => { setTimeout(lavarRAM, 15000); });
      // Evento 'stalled' eliminado intencionalmente para evitar bucles en Tizen OS.

      // Otorga permisos de mantener pantalla encendida al primer toque del control
      document.addEventListener("click", async () => { try { if ("wakeLock" in navigator) await navigator.wakeLock.request("screen"); } catch (e) {} }, { once: true });

      function fetchSeguro(url, timeoutMs = 20000) {
        return Promise.race([ fetch(url, { cache: "no-store" }), new Promise((_, r) => setTimeout(() => r(new Error("Timeout")), timeoutMs)) ]);
      }
// ==========================================
      // 3. RELOJ MAESTRO (Redundancia Triple + Offset)
      // ==========================================
      
      let offsetReloj = null; // Memoria para guardar el atraso/adelanto de la TV

      async function obtenerFechaReal() {
        const horaTV_UTC = new Date().getTime();

        try {
          // Intento 1: timeapi (Timeout a 10s para reaccionar rápido)
          const res1 = await fetchSeguro("https://timeapi.io/api/Time/current/zone?timeZone=America/El_Salvador", 10000);
          if (res1.ok) { 
            const data = await res1.json(); 
            // Calculamos la hora real universal
            const realUTC = Date.UTC(data.year, data.month - 1, data.day, data.hour, data.minute, data.seconds) + (6 * 3600000);
            offsetReloj = realUTC - horaTV_UTC; // Guardamos el error de la TV
            return formatSVTimeP3(realUTC);
          } 
          throw new Error("API1");
        } catch (error1) {
          try {
            // Intento 2: worldtimeapi
            const res2 = await fetchSeguro("https://worldtimeapi.org/api/timezone/America/El_Salvador", 10000);
            if (res2.ok) { 
              const data2 = await res2.json(); 
              const realUTC = data2.unixtime * 1000;
              offsetReloj = realUTC - horaTV_UTC; // Guardamos el error de la TV
              return formatSVTimeP3(realUTC);
            } 
            throw new Error("API2");
          } catch (error2) {
            // ====================================================
            // INTENTO 3: RASTREADOR DE DESFASE
            // ====================================================
            // Si no hay internet, agarra la hora de la TV y le suma el error guardado.
            const currentRealUTC = horaTV_UTC + (offsetReloj || 0);
            return formatSVTimeP3(currentRealUTC);
          }
        }
      }

      // Convertidor especial para Pantalla 3
      function formatSVTimeP3(utcEpoch) {
        // Restamos 6 horas para llegar a El Salvador
        const svTime = new Date(utcEpoch - (6 * 3600000));
        let dia = svTime.getUTCDay();
        if (dia === 0) dia = 7; // Regla especial: Domingo es 7
        
        return { 
          getHours: () => svTime.getUTCHours(), 
          getMinutes: () => svTime.getUTCMinutes(), 
          getDay: () => dia 
        };
      }

      // ==========================================
      // 4. CEREBRO DE TOMA DE DECISIONES
      // ==========================================
      async function cargarPlaylist() {
        try {
          if (!navigator.onLine) throw new Error("Offline");

          const response = await fetch(URL_PLAYLIST + "?t=" + new Date().getTime(), { cache: "no-store" });
          if (!response.ok) return; 
          let data; try { data = await response.json(); } catch (e) { return; }

          const ahora = await obtenerFechaReal();
          const horaActual = String(ahora.getHours()).padStart(2, "0") + ":" + String(ahora.getMinutes()).padStart(2, "0");
          let dia = ahora.getDay();
          let videoEncontrado = "";

          // CASCADA 1: Promociones temporales
          if (data.excepciones_temporales && data.excepciones_temporales[sucursalActual]) {
            for (let turno of data.excepciones_temporales[sucursalActual]) {
              if (horaActual >= turno.inicio && horaActual <= turno.fin) { videoEncontrado = turno.url; break; }
            }
          }
          
          // CASCADA 2: Buffet de Fines de Semana
          if (!videoEncontrado) {
            if (data.excepciones_dias && data.excepciones_dias[sucursalActual] && data.excepciones_dias[sucursalActual][dia]) {
              for (let turno of data.excepciones_dias[sucursalActual][dia]) {
                if (horaActual >= turno.inicio && horaActual <= turno.fin) { videoEncontrado = turno.url; break; }
              }
            }
          }

          // CASCADA 3: Horarios Base (Lunes a Viernes)
          if (!videoEncontrado) {
            let miPerfil = data.asignacion_perfiles && data.asignacion_perfiles[sucursalActual] ? data.asignacion_perfiles[sucursalActual] : "default";
            let horariosPerfil = data.perfiles[miPerfil] || data.perfiles["default"];
            for (let turno of horariosPerfil) {
              if (horaActual >= turno.inicio && horaActual <= turno.fin) { videoEncontrado = turno.url; break; }
            }
          }

          // --- MOTOR DE REPRODUCCIÓN (Anti-Bloqueos) ---
          if (videoEncontrado) {
            if (currentUrl === "") {
              // Arranque inicial: Sello de tiempo para burlar la lista negra de televisores viejos
              currentUrl = videoEncontrado; 
              videoElement.src = currentUrl + "?v=" + new Date().getTime(); 
              videoElement.load();
              intentarReproducir();
            } else if (currentUrl !== videoEncontrado) {
              // Cambio de turno (ej. Mañana a Almuerzo): Reinicio limpio del equipo
              lavarRAM(); 
            }
            // Si el video no ha cambiado, ignora todo y deja que la TV siga consumiendo de su propia RAM
          }

        } catch (error) {
          // Reintento silencioso en 15 segundos si el router falló
          setTimeout(cargarPlaylist, 15000);
          return;
        }

        // Modo Ahorro: Solo consulta a la nube cada 5 minutos 
        setTimeout(cargarPlaylist, 300000);
      }

      // ==========================================
      // 5. RUTINAS DE MANTENIMIENTO Y WATCHDOG
      // ==========================================
      
      // Auto-reanudación si el video se pausa accidentalmente
      setInterval(() => { if (videoElement.paused && videoElement.src && navigator.onLine) intentarReproducir(); }, 5000);
      
      // Limpieza profunda de memoria cada 4 horas
      setInterval(lavarRAM, 14400000);

      // --- EL PERRO GUARDIÁN (Watchdog Anti-Congelamiento) ---
      let ultimoTiempoVideo = -1;
      let alertasCongelamiento = 0;

      setInterval(() => {
        if (currentUrl !== "" && !videoElement.paused) {
          let tiempoActual = videoElement.currentTime;

          if (tiempoActual === ultimoTiempoVideo) {
            alertasCongelamiento++;
            if (alertasCongelamiento === 1) {
              videoElement.load();
              intentarReproducir();
            } else if (alertasCongelamiento >= 2) {
              lavarRAM();
            }
          } else {
            alertasCongelamiento = 0;
          }
          ultimoTiempoVideo = tiempoActual;
        }
      }, 20000);

      // Arranque del sistema
      cargarPlaylist();
    </script>
  </body>
</html>
