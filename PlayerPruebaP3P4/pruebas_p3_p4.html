<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pantalla 3&4 Pruebas - Publicidad Continua</title>
    <style>
      body,
      html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background-color: #1a1a1a;
        background-image: url("https://project-cast.sfo3.cdn.digitaloceanspaces.com/fondo.jpg");
        background-position: center;
        background-repeat: no-repeat;
        background-size: contain;
      }
      video {
        width: 100%;
        height: 100%;
        object-fit: cover;
        position: absolute;
        z-index: 5;
      }
    </style>
  </head>
  <body>
    <video id="videoPlayer" muted playsinline loop preload="auto"></video>

    <script>
      // Ruta al JSON de la Pantalla 5
      const URL_PLAYLIST =
        "https://project-cast.sfo3.cdn.digitaloceanspaces.com/pantalla5/playlist_p5.json";
      const videoElement = document.getElementById("videoPlayer");

      // --- IDENTIFICADOR DE SUCURSAL ---
      const urlParams = new URLSearchParams(window.location.search);
      const sucursalActual = urlParams.get("sucursal")
        ? urlParams.get("sucursal").toLowerCase()
        : "default";

      let currentUrl = "";
      let ultimaModificacion = "";
      let intentandoReproducir = false;

      function intentarReproducir() {
        if (intentandoReproducir) return;
        intentandoReproducir = true;
        videoElement
          .play()
          .then(() => {
            intentandoReproducir = false;
          })
          .catch(() => {
            intentandoReproducir = false;
          });
      }

      function lavarRAM() {
        videoElement.pause();
        videoElement.removeAttribute("src");
        videoElement.load();
        currentUrl = "";

        if (navigator.onLine) {
          setTimeout(() => {
            const params = new URLSearchParams(window.location.search);
            params.set("r", new Date().getTime());
            window.location.replace(
              window.location.origin +
                window.location.pathname +
                "?" +
                params.toString(),
            );
          }, 500);
        }
      }

      setInterval(lavarRAM, 2700000);

      videoElement.addEventListener("error", () => {
        setTimeout(lavarRAM, 3000);
      });
      videoElement.addEventListener("stalled", () => {
        videoElement.load();
        intentarReproducir();
      });
      document.addEventListener(
        "click",
        async () => {
          try {
            if ("wakeLock" in navigator)
              await navigator.wakeLock.request("screen");
          } catch (e) {}
        },
        { once: true },
      );

      async function cargarPlaylist() {
        try {
          if (!navigator.onLine) throw new Error("Offline");

          const response = await fetch(
            URL_PLAYLIST + "?t=" + new Date().getTime(),
            { cache: "no-store" },
          );
          if (!response.ok) return;
          let data;
          try {
            data = await response.json();
          } catch (e) {
            return;
          }

          let videoEncontrado = "";

          // Lógica directa: Busca el video de la sucursal, si no existe, usa el default
          if (data.perfiles && data.perfiles[sucursalActual]) {
            videoEncontrado = data.perfiles[sucursalActual];
          } else if (data.default) {
            videoEncontrado = data.default;
          }

          if (videoEncontrado) {
            if (currentUrl === "") {
              currentUrl = videoEncontrado;
              videoElement.src = currentUrl + "?v=" + new Date().getTime();
              videoElement.load();
              intentarReproducir();
            } else if (videoEncontrado !== currentUrl) {
              lavarRAM();
            } else {
              try {
                const resHead = await fetch(
                  currentUrl + "?check=" + new Date().getTime(),
                  { method: "HEAD", cache: "no-store" },
                );
                if (resHead.ok) {
                  const modificado = resHead.headers.get("Last-Modified");
                  if (modificado) {
                    if (!ultimaModificacion) {
                      ultimaModificacion = modificado;
                    } else if (ultimaModificacion !== modificado) {
                      lavarRAM();
                    }
                  }
                }
              } catch (e) {}
            }
          }
        } catch (error) {
        } finally {
          setTimeout(cargarPlaylist, 30000);
        }
      }

      setInterval(() => {
        if (videoElement.paused && videoElement.src && navigator.onLine)
          intentarReproducir();
      }, 5000);
      cargarPlaylist();
    </script>
  </body>
</html>
