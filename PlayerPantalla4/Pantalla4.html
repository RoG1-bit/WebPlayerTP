<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pantalla-4-Online</title>
    <style>
      body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #1a1a1a;
        background-image: url("https://pub-29979a9319a64459816c0aa2b9d4d11c.r2.dev/fondo.jpg");
        background-position: center; background-repeat: no-repeat; background-size: contain;
      }
      video { width: 100%; height: 100%; object-fit: cover; position: absolute; z-index: 5; }
    </style>
  </head>
  <body>
    <video id="videoPlayer" muted playsinline loop preload="auto"></video>

    <script>
      const URL_PLAYLIST = "https://pub-29979a9319a64459816c0aa2b9d4d11c.r2.dev/pantalla4/playlist_p4.json";
      const videoElement = document.getElementById("videoPlayer");

      // --- IDENTIFICADOR DE SUCURSAL ---
      const urlParams = new URLSearchParams(window.location.search);
      const sucursalActual = urlParams.get("sucursal") ? urlParams.get("sucursal").toLowerCase() : "default";

      let currentUrl = ""; let ultimaModificacion = ""; let intentandoReproducir = false;

      function intentarReproducir() {
        if (intentandoReproducir) return; intentandoReproducir = true;
        videoElement.play().then(() => { intentandoReproducir = false; }).catch(() => { intentandoReproducir = false; });
      }

      function lavarRAM() {
        videoElement.pause(); videoElement.removeAttribute("src"); videoElement.load(); currentUrl = "";
        if (navigator.onLine) {
          setTimeout(() => {
            const params = new URLSearchParams(window.location.search); params.set("r", new Date().getTime());
            window.location.replace(window.location.origin + window.location.pathname + "?" + params.toString());
          }, 500);
        }
      }

      setInterval(lavarRAM, 2700000);

      videoElement.addEventListener("error", () => { setTimeout(lavarRAM, 3000); });
      videoElement.addEventListener("stalled", () => { videoElement.load(); intentarReproducir(); });
      document.addEventListener("click", async () => { try { if ("wakeLock" in navigator) await navigator.wakeLock.request("screen"); } catch (e) {} }, { once: true });

      function fetchSeguro(url, timeoutMs = 20000) {
        return Promise.race([ fetch(url, { cache: "no-store" }), new Promise((_, r) => setTimeout(() => r(new Error("Timeout")), timeoutMs)) ]);
      }

      // --- MOTOR DE HORA EXACTA ---
      async function obtenerFechaReal() {
        try {
          const res1 = await fetchSeguro("https://timeapi.io/api/Time/current/zone?timeZone=America/El_Salvador");
          if (res1.ok) { const data = await res1.json(); return { getHours: () => data.hour, getMinutes: () => data.minute }; } throw new Error("API 1");
        } catch (error1) {
          try {
            const res2 = await fetchSeguro("https://worldtimeapi.org/api/timezone/America/El_Salvador");
            if (res2.ok) { const data2 = await res2.json(); const svTime = new Date(data2.unixtime * 1000 - 6 * 3600000);
              return { getHours: () => svTime.getUTCHours(), getMinutes: () => svTime.getUTCMinutes() };
            } throw new Error("API 2");
          } catch (error2) {
            const localDate = new Date(); return { getHours: () => localDate.getHours(), getMinutes: () => localDate.getMinutes() };
          }
        }
      }

      // --- CEREBRO DE REPRODUCCIÓN (Ahora con Horarios) ---
      async function cargarPlaylist() {
        try {
          if (!navigator.onLine) throw new Error("Offline");

          const response = await fetch(URL_PLAYLIST + "?t=" + new Date().getTime(), { cache: "no-store" });
          if (!response.ok) return; let data; try { data = await response.json(); } catch (e) { return; }

          const ahora = await obtenerFechaReal();
          const horaActual = String(ahora.getHours()).padStart(2, "0") + ":" + String(ahora.getMinutes()).padStart(2, "0");
          let videoEncontrado = "";

          // 1. Descubre a qué perfil pertenece la sucursal (o si no tiene, usa el default)
          let miPerfil = data.asignacion_perfiles && data.asignacion_perfiles[sucursalActual] ? data.asignacion_perfiles[sucursalActual] : "default";

          // 2. Busca los horarios de ese perfil
          let horariosPerfil = data.perfiles[miPerfil] || data.perfiles["default"];

          // 3. Revisa la hora actual y asigna el video correspondiente
          for (let turno of horariosPerfil) {
            if (horaActual >= turno.inicio && horaActual <= turno.fin) {
              videoEncontrado = turno.url;
              break;
            }
          }

          if (videoEncontrado) {
            if (currentUrl === "") {
              currentUrl = videoEncontrado;
              videoElement.src = currentUrl; 
              videoElement.load();
              intentarReproducir();
            } else if (videoEncontrado !== currentUrl) {
              lavarRAM(); // Cambió el turno (ej. de Mañana a Almuerzo)
            } else {
              try { // Chequeo sigiloso por si Mercadeo subió un video nuevo con el mismo nombre
                const resHead = await fetch(currentUrl + "?check=" + new Date().getTime(), { method: "HEAD", cache: "no-store" });
                if (resHead.ok) {
                  const modificado = resHead.headers.get("Last-Modified");
                  if (modificado) {
                    if (!ultimaModificacion) { ultimaModificacion = modificado; } 
                    else if (ultimaModificacion !== modificado) { lavarRAM(); }
                  }
                }
              } catch (e) {}
            }
          }
        } catch (error) {
          // Si el WiFi falló, reintenta en 15 SEGUNDOS
          setTimeout(cargarPlaylist, 15000);
          return;
        }
        // Si todo cargó bien, descansa 10 minutos
        setTimeout(cargarPlaylist, 600000);
      }

      setInterval(() => { if (videoElement.paused && videoElement.src && navigator.onLine) intentarReproducir(); }, 5000);
      cargarPlaylist();
    </script>
  </body>
</html>
