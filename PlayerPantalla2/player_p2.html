<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Reproductor P2 - Típicos Margoth</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; position: absolute; }
    </style>
</head>
<body>
    <div id="botonIniciar" style="display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 1000; background: rgba(255,0,0,0.8); color: white; padding: 20px 40px; font-size: 24px; border-radius: 10px; cursor: pointer; font-family: sans-serif;">
        Tocar para iniciar video
    </div>
    <video id="videoPlayer" muted playsinline loop></video>
    <script>
        const URL_PLAYLIST = 'https://project-cast.sfo3.cdn.digitaloceanspaces.com/pantalla2/playlist_p2.json';
        const videoElement = document.getElementById('videoPlayer');
        const botonIniciar = document.getElementById('botonIniciar');
        let currentUrl = ''; 
        let ultimaModificacion = ''; 

        function intentarReproducir() {
            videoElement.play().then(() => {
                botonIniciar.style.display = 'none';
            }).catch((error) => {
                console.error("El navegador bloqueó el Autoplay:", error);
                botonIniciar.style.display = 'block';
            });
        }

        botonIniciar.addEventListener('click', intentarReproducir);

        function recargarPaginaSegura() {
            videoElement.pause();
            videoElement.removeAttribute('src');
            videoElement.load();
            setTimeout(() => {
                window.location.href = window.location.href.split('?')[0] + '?refresh=' + new Date().getTime();
            }, 500);
        }

        function obtenerFechaElSalvador() {
            const svString = new Date().toLocaleString("en-US", {timeZone: "America/El_Salvador"});
            return new Date(svString);
        }

        function obtenerTipoSemana() {
            const ahora = obtenerFechaElSalvador();
            
            const diaSemana = ahora.getDay(); 
            const diasParaRestar = diaSemana === 0 ? 6 : diaSemana - 1;
            
            const lunesActual = new Date(ahora);
            lunesActual.setDate(ahora.getDate() - diasParaRestar);
            lunesActual.setHours(0, 0, 0, 0);

            const fechaBaseUTC = Date.UTC(2026, 1, 9); 
            const lunesActualUTC = Date.UTC(lunesActual.getFullYear(), lunesActual.getMonth(), lunesActual.getDate());

            const diferenciaMs = lunesActualUTC - fechaBaseUTC;
            const semanasPasadas = Math.floor(diferenciaMs / (1000 * 60 * 60 * 24 * 7));
            
            return (semanasPasadas % 2 === 0) ? "S1" : "S2";
        }

        async function cargarPlaylist() {
            try {
                const response = await fetch(URL_PLAYLIST + '?t=' + new Date().getTime());
                
                if (!response.ok) {
                    console.warn("No se pudo cargar el JSON. Código HTTP:", response.status);
                    return;
                }

                const data = await response.json();
                
                const ahora = obtenerFechaElSalvador();
                const horaActual = String(ahora.getHours()).padStart(2, '0') + ':' + String(ahora.getMinutes()).padStart(2, '0');
                
                let dia = ahora.getDay();
                if(dia === 0) dia = 7; 

                const tipoSemana = obtenerTipoSemana();
                let videoEncontrado = '';

                if (horaActual >= "00:00" && horaActual <= "10:29") {
                    videoEncontrado = data.fijos.manana;
                } else if (horaActual >= "10:30" && horaActual <= "13:59") {
                    videoEncontrado = (tipoSemana === "S1") ? data.almuerzos_s1[dia] : data.almuerzos_s2[dia];
                } else if (horaActual >= "14:00" && horaActual <= "23:59") {
                    videoEncontrado = data.fijos.tarde;
                }

                if (videoEncontrado) {
                    if (currentUrl === '') {
                        currentUrl = videoEncontrado;
                        videoElement.src = currentUrl + '?update=' + new Date().getTime();
                        videoElement.load();
                        intentarReproducir();
                    } else if (videoEncontrado !== currentUrl) {
                        recargarPaginaSegura();
                    } else {
                        try {
                            const resHead = await fetch(currentUrl + '?check=' + new Date().getTime(), { method: 'HEAD' });
                            if (resHead.ok) {
                                const modificado = resHead.headers.get('Last-Modified');
                                if (modificado) {
                                    if (!ultimaModificacion) {
                                        ultimaModificacion = modificado;
                                    } else if (ultimaModificacion !== modificado) {
                                        recargarPaginaSegura();
                                    }
                                }
                            }
                        } catch (e) {
                            console.warn("Fallo de red al comprobar actualización del video. Reintentando en el próximo ciclo.");
                        } 
                    }
                }
            } catch (error) { console.error("Error P2:", error); }
        }

        setInterval(() => { if(videoElement.paused && videoElement.src) intentarReproducir(); }, 1000);
        setInterval(cargarPlaylist, 30000);
        cargarPlaylist();
    </script>
</body>
</html>
