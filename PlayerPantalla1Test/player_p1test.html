<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pantalla-1-Online</title>
    <style>
      /* Estilos básicos para que el video ocupe toda la pantalla sin bordes */
      body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #1a1a1a; 
        background-image: url("https://pub-29979a9319a64459816c0aa2b9d4d11c.r2.dev/fondo.jpg"); 
        background-position: center; background-repeat: no-repeat; background-size: contain; 
      }
      video { width: 100%; height: 100%; object-fit: cover; position: absolute; z-index: 5; }
    </style>
  </head>
  <body>
    <video id="videoPlayer" muted playsinline loop preload="auto"></video>

    <script>
      // 1. CONFIGURACIÓN BASE
      // Ruta maestra donde vive el archivo que dicta qué reproducir
      const URL_PLAYLIST = "https://pub-29979a9319a64459816c0aa2b9d4d11c.r2.dev/pantalla1/playlist_p1.json";
      const videoElement = document.getElementById("videoPlayer");

      // Lee la URL de la TV (ej. ?sucursal=bambu). Si la TV no tiene configurada una, asume que es la 'general'
      const urlParams = new URLSearchParams(window.location.search);
      const sucursalActual = urlParams.get("sucursal") ? urlParams.get("sucursal").toLowerCase() : "general";

      let currentUrl = ""; // Guarda el video que se está reproduciendo actualmente
      let ultimaModificacion = ""; // Guarda la fecha de subida del video para saber si Mercadeo subió uno nuevo
      let intentandoReproducir = false; // Evita que la TV intente darle "Play" 100 veces por segundo y se trabe

      // 2. FUNCIÓN DE REPRODUCCIÓN SEGURA
      function intentarReproducir() {
        if (intentandoReproducir) return;
        intentandoReproducir = true;
        videoElement.play().then(() => { intentandoReproducir = false; }).catch(() => { intentandoReproducir = false; });
      }

      // 3. MOTOR DE LIBERACIÓN DE RAM (El Seguro de Vida)
      // Esta función evita que la TV se congele por estar encendida todo el día.
      function lavarRAM() {
        videoElement.pause();
        videoElement.removeAttribute("src");
        videoElement.load();
        currentUrl = "";

        if (navigator.onLine) {
          setTimeout(() => {
            // Recarga la página por completo agregando un número aleatorio para saltar el caché de la página web,
            // pero MANTIENE la sucursal intacta.
            const params = new URLSearchParams(window.location.search);
            params.set("r", new Date().getTime());
            window.location.replace(window.location.origin + window.location.pathname + "?" + params.toString());
          }, 500);
        }
      }

      // Ejecuta el Lavado de RAM cada 45 minutos (2,700,000 milisegundos)
      setInterval(lavarRAM, 2700000);

      // 4. PREVENCIÓN DE ERRORES
      videoElement.addEventListener("error", () => { setTimeout(lavarRAM, 3000); }); // Si el video falla, lava la RAM
      videoElement.addEventListener("stalled", () => { videoElement.load(); intentarReproducir(); }); // Si el internet parpadea, recarga el video
      
      // Despierta la pantalla con el primer clic del técnico (WakeLock)
      document.addEventListener("click", async () => { try { if ("wakeLock" in navigator) await navigator.wakeLock.request("screen"); } catch (e) {} }, { once: true });

      // 5. OBTENCIÓN DE HORA REAL (Múltiples APIs de respaldo)
      function fetchSeguro(url, timeoutMs = 20000) {//20s para que no muera en el intento de obtener la hora
        return Promise.race([ fetch(url, { cache: "no-store" }), new Promise((_, r) => setTimeout(() => r(new Error("Timeout")), timeoutMs)) ]);
      }

      // Pregunta la hora exacta de El Salvador a internet para que las TVs nunca se desfasen
      async function obtenerFechaReal() {
        try {
          const res1 = await fetchSeguro("https://timeapi.io/api/Time/current/zone?timeZone=America/El_Salvador");
          if (res1.ok) {
            const data = await res1.json();
            const dias = { Sunday: 0, Monday: 1, Tuesday: 2, Wednesday: 3, Thursday: 4, Friday: 5, Saturday: 6 };
            return { getFullYear: () => data.year, getMonth: () => data.month - 1, getDate: () => data.day, getDay: () => dias[data.dayOfWeek], getHours: () => data.hour, getMinutes: () => data.minute };
          } throw new Error("API 1");
        } catch (error1) {
          try { // Si falla la API 1, intenta con la API 2
            const res2 = await fetchSeguro("https://worldtimeapi.org/api/timezone/America/El_Salvador");
            if (res2.ok) {
              const data2 = await res2.json();
              const svTime = new Date(data2.unixtime * 1000 - 6 * 3600000);
              return { getFullYear: () => svTime.getUTCFullYear(), getMonth: () => svTime.getUTCMonth(), getDate: () => svTime.getUTCDate(), getDay: () => svTime.getUTCDay(), getHours: () => svTime.getUTCHours(), getMinutes: () => svTime.getUTCMinutes() };
            } throw new Error("API 2");
          } catch (error2) { // Si fallan ambas, usa la hora interna del televisor
            const localDate = new Date();
            return { getFullYear: () => localDate.getFullYear(), getMonth: () => localDate.getMonth(), getDate: () => localDate.getDate(), getDay: () => localDate.getDay(), getHours: () => localDate.getHours(), getMinutes: () => localDate.getMinutes() };
          }
        }
      }

      // Calcula si estamos en la Semana 1 o Semana 2 del menú
      function obtenerTipoSemana(ahora) {
        const diaSemana = ahora.getDay();
        const diasParaRestar = diaSemana === 0 ? 6 : diaSemana - 1;
        const hoyUTC = Date.UTC(ahora.getFullYear(), ahora.getMonth(), ahora.getDate());
        const lunesActualUTC = hoyUTC - diasParaRestar * 24 * 60 * 60 * 1000;
        return Math.floor((lunesActualUTC - Date.UTC(2026, 1, 9)) / (1000 * 60 * 60 * 24 * 7)) % 2 === 0 ? "S1" : "S2";
      }

      // 6. CEREBRO PRINCIPAL: ELIGE QUÉ VIDEO REPRODUCIR
      async function cargarPlaylist() {
        try {
          if (!navigator.onLine) throw new Error("Offline");

          // Descarga el JSON con las órdenes (Le ponemos t= para que siempre lea la última versión del JSON, esto no gasta casi nada)
          const response = await fetch(URL_PLAYLIST + "?t=" + new Date().getTime(), { cache: "no-store" });
          if (!response.ok) return;
          let data;
          try { data = await response.json(); } catch (e) { return; }

          const ahora = await obtenerFechaReal();
          const horaActual = String(ahora.getHours()).padStart(2, "0") + ":" + String(ahora.getMinutes()).padStart(2, "0");
          let dia = ahora.getDay(); if (dia === 0) dia = 7; // Ajuste: 1=Lunes, 7=Domingo
          const tipoSemana = obtenerTipoSemana(ahora);
          let videoEncontrado = "";

          // --- REGLAS DE HORARIOS ---
          if (horaActual >= "00:00" && horaActual <= "10:29") {
            // Detecta si la sucursal tiene un Buffet asignado para este día
            if (data.excepciones_manana && data.excepciones_manana[sucursalActual] && data.excepciones_manana[sucursalActual][dia]) {
              videoEncontrado = data.excepciones_manana[sucursalActual][dia]; 
            } else {
              videoEncontrado = data.fijos.manana; 
            }
          } else if (horaActual >= "10:30" && horaActual <= "13:59") {
            // Busca el almuerzo del día según la semana
            let almuerzoHoy = tipoSemana === "S1" ? data.almuerzos_s1[dia] : data.almuerzos_s2[dia];
            videoEncontrado = almuerzoHoy ? almuerzoHoy : data.fijos.manana;
          } else if (horaActual >= "14:00" && horaActual <= "23:59") {
            videoEncontrado = data.fijos.tarde;
          }

          // Si encontró un video que debe reproducir
          if (videoEncontrado) {
            
            // Si la TV acaba de encender (no hay video actual)
            if (currentUrl === "") {
              currentUrl = videoEncontrado;

              // 🚨🚨 OPTIMIZACIÓN VITAL 1: QUITAR CACHÉ BUSTING DEL VIDEO 🚨🚨
              // ANTES DECÍA: videoElement.src = currentUrl + "?v=" + new Date().getTime();
              // Esto forzaba a la TV a descargar los 200MB de nuevo en cada ciclo, generando los 8 Terabytes.
              // AHORA: Se asigna la URL limpia. El navegador de la TV hará "streaming" natural y usará su memoria local.
              videoElement.src = currentUrl; 
              
              videoElement.load();
              intentarReproducir();
            
            } else if (videoEncontrado !== currentUrl) {
              // Si la hora cambió (ej. de Mañana a Almuerzo), lava la RAM para cambiar de video limpio
              lavarRAM();
            } else {
              // Si sigue siendo el mismo video, pregunta sigilosamente al servidor (solo las cabeceras/headers)
              // si Mercadeo acaba de subir uno nuevo con el mismo nombre.
              try {
                const resHead = await fetch(currentUrl + "?check=" + new Date().getTime(), { method: "HEAD", cache: "no-store" });
                if (resHead.ok) {
                  const modificado = resHead.headers.get("Last-Modified");
                  if (modificado) {
                    if (!ultimaModificacion) { ultimaModificacion = modificado; } 
                    else if (ultimaModificacion !== modificado) { lavarRAM(); } // Si Mercadeo subió video, reinicia
                  }
                }
              } catch (e) {}
            }
          }
        } catch (error) {
          // Si el WiFi falló o está super lento, reintenta en 15 SEGUNDOS, no en 10 minutos.
    setTimeout(cargarPlaylist, 15000); 
    return;
    }
  // Si todo cargó bien y el video ya está sonando, entonces sí, descansa 10 minutos.
  setTimeout(cargarPlaylist, 600000);
   }
        
      

      // Fuerza la reproducción si se detiene accidentalmente
      setInterval(() => { if (videoElement.paused && videoElement.src && navigator.onLine) intentarReproducir(); }, 5000);
      
      // ARRANQUE DEL SISTEMA
      cargarPlaylist();
    </script>
  </body>
</html>
