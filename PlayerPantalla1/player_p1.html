<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Reproductor P1 - Típicos Margoth</title>
    <style>
        /* CSS para quitar bordes y forzar pantalla completa del video */
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; position: absolute; }
    </style>
</head>
<body>
    <video id="videoPlayer" muted playsinline loop></video>
    
    <script>
        // URL del archivo de configuración JSON en DigitalOcean
        const URL_PLAYLIST = 'https://project-cast.sfo3.cdn.digitaloceanspaces.com/pantalla-1/playlist_p1.json';
        const videoElement = document.getElementById('videoPlayer');
        
        let currentUrl = ''; 
        let ultimaModificacion = ''; // Memoria RAM temporal para detectar reemplazos de video

        // 1. MOTOR DE ZONA HORARIA (Failsafe)
        // Fuerza la hora de El Salvador (UTC-6) sin importar si la TV está mal configurada
        function obtenerFechaElSalvador() {
            const d = new Date();
            const utc = d.getTime() + (d.getTimezoneOffset() * 60000);
            const svTime = new Date(utc - (3600000 * 6)); 
            return {
                getFullYear: () => svTime.getUTCFullYear(),
                getMonth: () => svTime.getUTCMonth(),
                getDate: () => svTime.getUTCDate(),
                getDay: () => svTime.getUTCDay(),
                getHours: () => svTime.getUTCHours(),
                getMinutes: () => svTime.getUTCMinutes(),
                getTime: () => d.getTime() 
            };
        }

        // 2. LÓGICA DE ROTACIÓN QUINCENAL (S1 / S2)
        // Usa una fecha estática en el pasado (9 Feb 2026) para evitar errores de calendario los domingos
        function obtenerTipoSemana() {
            const ahora = obtenerFechaElSalvador();
            const fechaBase = Date.UTC(2026, 1, 9); 
            const ahoraMs = Date.UTC(ahora.getFullYear(), ahora.getMonth(), ahora.getDate());
            const diferenciaMs = ahoraMs - fechaBase;
            const semanasPasadas = Math.floor(diferenciaMs / (1000 * 60 * 60 * 24 * 7));
            return (semanasPasadas % 2 === 0) ? "S1" : "S2";
        }

        // 3. FUNCIÓN PRINCIPAL DE SINCRONIZACIÓN
        async function cargarPlaylist() {
            try {
                // Descarga el JSON. El "?t=" es un Cache Buster para que siempre lea la versión más fresca
                const response = await fetch(URL_PLAYLIST + '?t=' + new Date().getTime());
                const data = await response.json();
                
                const ahora = obtenerFechaElSalvador();
                // Formateo estricto a 2 dígitos (ej. "09:05" en vez de "9:5")
                const horaActual = String(ahora.getHours()).padStart(2, '0') + ':' + String(ahora.getMinutes()).padStart(2, '0');
                
                let dia = ahora.getDay();
                if(dia === 0) dia = 7; // Convertimos el domingo de 0 a 7 para que coincida con el JSON

                const tipoSemana = obtenerTipoSemana();
                let videoEncontrado = '';

                // 4. LÓGICA DE HORARIOS OPERATIVOS
                if (horaActual >= "00:00" && horaActual <= "10:29") {
                    videoEncontrado = data.fijos.manana;
                } else if (horaActual >= "10:30" && horaActual <= "13:59") {
                    videoEncontrado = (tipoSemana === "S1") ? data.almuerzos_s1[dia] : data.almuerzos_s2[dia];
                } else if (horaActual >= "14:00" && horaActual <= "23:59") {
                    videoEncontrado = data.fijos.tarde;
                }

                // 5. MOTOR DE ACTUALIZACIÓN DINÁMICA DE VIDEOS (Petición HEAD)
                if (videoEncontrado) {
                    let forzarRecarga = false;

                    if (videoEncontrado !== currentUrl) {
                        // Si el horario cambió (ej. pasó de mañana a almuerzo), cambia el video
                        currentUrl = videoEncontrado;
                        ultimaModificacion = ''; 
                        forzarRecarga = true;
                    } else {
                        // Si es el mismo video, hace un "ping" al servidor para ver si el admin reemplazó el archivo
                        try {
                            const resHead = await fetch(currentUrl + '?check=' + new Date().getTime(), { method: 'HEAD' });
                            const modificado = resHead.headers.get('Last-Modified'); // Lee la fecha del archivo en DigitalOcean
                            if (modificado) {
                                if (!ultimaModificacion) {
                                    ultimaModificacion = modificado;
                                } else if (ultimaModificacion !== modificado) {
                                    // Si la fecha en el servidor es distinta a la de la memoria, fuerza actualización
                                    ultimaModificacion = modificado;
                                    forzarRecarga = true;
                                }
                            }
                        } catch (e) { /* Error silencioso de red, el video actual sigue en loop */ } 
                    }

                    // 6. CACHE BUSTER FINAL (Engaña a la TV para que descargue el archivo nuevo)
                    if (forzarRecarga) {
                        videoElement.src = currentUrl + '?update=' + new Date().getTime();
                        videoElement.load();
                        videoElement.play().catch(() => {});
                    }
                }
            } catch (error) { console.error("Error de Red o JSON:", error); }
        }

        // 7. SISTEMA DE RESPALDO (Failsafes)
        // Fuerza el "play" por si ocurre un microcorte de energía y el navegador se pausa
        setInterval(() => { if(videoElement.paused && videoElement.src) videoElement.play().catch(() => {}); }, 1000);
        // Revisa la hora y los cambios en el servidor cada 30 segundos
        setInterval(cargarPlaylist, 30000);
        
        // Arranque inicial
        cargarPlaylist();
    </script>
</body>
</html>
