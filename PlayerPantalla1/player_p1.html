<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reproductor P1 AUTOMATIZADO - Típicos Margoth</title>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; 
            /* Fondo Salvavidas: Cambia la URL por el logo de Margoth */
            background-color: #1a1a1a;
            background-image: url('https://project-cast.sfo3.cdn.digitaloceanspaces.com/fondo.jpg'); 
            background-position: center;
            background-repeat: no-repeat;
            background-size: contain;
        }
        video { 
            width: 100%; height: 100%; object-fit: cover; position: absolute; 
            z-index: 5; 
        }
    </style>
</head>
<body>
    <video id="videoPlayer" muted playsinline loop preload="auto"></video>
    
    <script>
        const URL_PLAYLIST = 'https://project-cast.sfo3.cdn.digitaloceanspaces.com/pantalla1/playlist_p1.json';
        const videoElement = document.getElementById('videoPlayer');
        let currentUrl = ''; 
        let ultimaModificacion = ''; 
        let intentandoReproducir = false; 

        // 1. EL "FANTASMA" DEL AUTOPLAY
        function intentarReproducir() {
            if (intentandoReproducir) return;
            intentandoReproducir = true;
            
            videoElement.play().then(() => {
                intentandoReproducir = false;
            }).catch((error) => {
                intentandoReproducir = false;
            });
        }

        // 2. SISTEMAS DE SUPERVIVENCIA Y ANTI-CRASH (Hardware / RAM)
        videoElement.addEventListener('error', () => {
            window.location.reload(true);
        });

        videoElement.addEventListener('stalled', () => {
            videoElement.load();
            intentarReproducir();
        });

        async function mantenerPantallaDespierta() {
            try {
                if ('wakeLock' in navigator) {
                    await navigator.wakeLock.request('screen');
                }
            } catch (err) {}
        }
        document.addEventListener('click', mantenerPantallaDespierta, { once: true });

        // Lavado de RAM automático cada 2 horas (Parche WebOS)
        setInterval(() => { window.location.reload(true); }, 7200000); 

        // 3. MOTOR CORE
        function recargarPaginaSegura() {
            videoElement.pause();
            videoElement.src = ''; 
            videoElement.removeAttribute('src');
            videoElement.load();
            setTimeout(() => {
                window.location.href = window.location.href.split('?')[0] + '?refresh=' + new Date().getTime();
            }, 500);
        }

        function fetchSeguro(url, timeoutMs = 3000) {
            return Promise.race([
                fetch(url, { cache: 'no-store' }),
                new Promise((_, reject) => setTimeout(() => reject(new Error("Timeout")), timeoutMs))
            ]);
        }

        async function obtenerFechaReal() {
            try {
                const res1 = await fetchSeguro('https://timeapi.io/api/Time/current/zone?timeZone=America/El_Salvador');
                if (res1.ok) {
                    const data = await res1.json();
                    const dias = {"Sunday":0, "Monday":1, "Tuesday":2, "Wednesday":3, "Thursday":4, "Friday":5, "Saturday":6};
                    return {
                        getFullYear: () => data.year, getMonth: () => data.month - 1, getDate: () => data.day,
                        getDay: () => dias[data.dayOfWeek], getHours: () => data.hour, getMinutes: () => data.minute
                    };
                }
                throw new Error("API 1 falló");
            } catch (error1) {
                try {
                    const res2 = await fetchSeguro('https://worldtimeapi.org/api/timezone/America/El_Salvador');
                    if (res2.ok) {
                        const data2 = await res2.json();
                        const svTime = new Date((data2.unixtime * 1000) - (6 * 3600000));
                        return {
                            getFullYear: () => svTime.getUTCFullYear(), getMonth: () => svTime.getUTCMonth(), getDate: () => svTime.getUTCDate(),
                            getDay: () => svTime.getUTCDay(), getHours: () => svTime.getUTCHours(), getMinutes: () => svTime.getUTCMinutes()
                        };
                    }
                    throw new Error("API 2 falló");
                } catch (error2) {
                    // Si no hay red, aborta. Cero confianza en el reloj de la TV vieja.
                    throw new Error("Sin internet. Esperando conexión...");
                }
            }
        }

        function obtenerTipoSemana(ahora) {
            const diaSemana = ahora.getDay(); 
            const diasParaRestar = diaSemana === 0 ? 6 : diaSemana - 1;
            const hoyUTC = Date.UTC(ahora.getFullYear(), ahora.getMonth(), ahora.getDate());
            const lunesActualUTC = hoyUTC - (diasParaRestar * 24 * 60 * 60 * 1000);
            
            // Fecha de anclaje: Lunes 9 de febrero de 2026
            const fechaBaseUTC = Date.UTC(2026, 1, 9); 
            const diferenciaMs = lunesActualUTC - fechaBaseUTC;
            const semanasPasadas = Math.floor(diferenciaMs / (1000 * 60 * 60 * 24 * 7));
            return (semanasPasadas % 2 === 0) ? "S1" : "S2";
        }

        async function cargarPlaylist() {
            try {
                const response = await fetch(URL_PLAYLIST + '?t=' + new Date().getTime(), { cache: 'no-store' });
                if (!response.ok) return; 
                
                let data;
                try { data = await response.json(); } catch (e) { return; } 
                
                const ahora = await obtenerFechaReal();
                const horaActual = String(ahora.getHours()).padStart(2, '0') + ':' + String(ahora.getMinutes()).padStart(2, '0');
                let dia = ahora.getDay(); if(dia === 0) dia = 7; 

                const tipoSemana = obtenerTipoSemana(ahora);
                let videoEncontrado = '';

                if (horaActual >= "00:00" && horaActual <= "10:29") {
                    videoEncontrado = data.fijos.manana;
                } else if (horaActual >= "10:30" && horaActual <= "13:59") {
                    let almuerzoHoy = (tipoSemana === "S1") ? data.almuerzos_s1[dia] : data.almuerzos_s2[dia];
                    videoEncontrado = almuerzoHoy ? almuerzoHoy : data.fijos.manana;
                } else if (horaActual >= "14:00" && horaActual <= "23:59") {
                    videoEncontrado = data.fijos.tarde;
                }

                if (videoEncontrado) {
                    if (currentUrl === '') {
                        currentUrl = videoEncontrado;
                        videoElement.src = currentUrl + '?update=' + new Date().getTime();
                        videoElement.load();
                        intentarReproducir();
                    } else if (videoEncontrado !== currentUrl) {
                        recargarPaginaSegura();
                    } else {
                        try {
                            const resHead = await fetch(currentUrl + '?check=' + new Date().getTime(), { method: 'HEAD', cache: 'no-store' });
                            if (resHead.ok) {
                                const modificado = resHead.headers.get('Last-Modified');
                                if (modificado) {
                                    if (!ultimaModificacion) { ultimaModificacion = modificado; } 
                                    else if (ultimaModificacion !== modificado) { recargarPaginaSegura(); }
                                }
                            }
                        } catch (e) {} 
                    }
                }
            } catch (error) { 
                console.error("Error Core:", error); 
            } finally {
                setTimeout(cargarPlaylist, 30000); 
            }
        }

        // El vigilante silencioso
        setInterval(() => { 
            if(videoElement.paused && videoElement.src) {
                intentarReproducir(); 
            }
        }, 5000); 

        // Arranque
        cargarPlaylist();
        mantenerPantallaDespierta();
    </script>
</body>
</html>
