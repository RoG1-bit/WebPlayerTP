<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Reproductor P1 - Menú Sincronizado</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; position: absolute; }
    </style>
</head>
<body>
    <video id="videoPlayer" muted playsinline loop></video>
    <script>
        const URL_PLAYLIST = 'https://project-cast.sfo3.cdn.digitaloceanspaces.com/pantalla1/playlist_p1.json';
        const videoElement = document.getElementById('videoPlayer');
        let currentUrl = '';

        function obtenerTipoSemana() {
            const ahora = new Date();
            // AJUSTE: Lunes 09 de Febrero 2026 como base para que HOY sea Semana 2
            const fechaBase = new Date(2026, 1, 9); 
            const diferenciaMs = ahora - fechaBase;
            const semanasPasadas = Math.floor(diferenciaMs / (1000 * 60 * 60 * 24 * 7));
            // Si semanasPasadas es 0 (semana del 9), es S1. Si es 1 (esta semana del 16), es S2.
            return (semanasPasadas % 2 === 0) ? "S1" : "S2";
        }

        async function cargarPlaylist() {
            try {
                const response = await fetch(URL_PLAYLIST + '?t=' + new Date().getTime());
                const data = await response.json();
                const ahora = new Date();
                const horaActual = String(ahora.getHours()).padStart(2, '0') + ':' + String(ahora.getMinutes()).padStart(2, '0');
                
                let dia = ahora.getDay();
                if(dia === 0) dia = 7; 

                const tipoSemana = obtenerTipoSemana();
                let videoEncontrado = '';

                if (horaActual >= "00:00" && horaActual <= "10:29") {
                    videoEncontrado = data.fijos.manana;
                } 
                else if (horaActual >= "10:30" && horaActual <= "14:29") {
                    videoEncontrado = (tipoSemana === "S1") ? data.almuerzos_s1[dia] : data.almuerzos_s2[dia];
                } 
                else if (horaActual >= "14:30" && horaActual <= "23:59") {
                    videoEncontrado = data.fijos.tarde;
                }

                if (videoEncontrado && videoEncontrado !== currentUrl) {
                    currentUrl = videoEncontrado;
                    videoElement.src = currentUrl;
                    videoElement.load();
                    videoElement.play().catch(() => {});
                }
            } catch (error) { console.error("Error P1:", error); }
        }

        setInterval(() => { if(videoElement.paused && videoElement.src) videoElement.play().catch(() => {}); }, 1000);
        setInterval(cargarPlaylist, 30000);
        cargarPlaylist();
    </script>
</body>
</html>
