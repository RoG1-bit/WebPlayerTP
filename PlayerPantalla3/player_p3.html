<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reproductor Optimizado P3 - FIX</title>
    <style>
      body,
      html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background-color: #1a1a1a;
        background-image: url("https://project-cast.sfo3.cdn.digitaloceanspaces.com/fondo.jpg");
        background-position: center;
        background-repeat: no-repeat;
        background-size: contain;
      }
      video {
        width: 100%;
        height: 100%;
        object-fit: cover;
        position: absolute;
        z-index: 5;
      }
    </style>
  </head>
  <body>
    <video id="videoPlayer" muted playsinline loop preload="auto"></video>

    <script>
      const URL_PLAYLIST =
        "https://project-cast.sfo3.cdn.digitaloceanspaces.com/playlist_p3.json";
      const videoElement = document.getElementById("videoPlayer");
      let currentUrl = "";
      let ultimaModificacion = "";
      let intentandoReproducir = false;

      function intentarReproducir() {
        if (intentandoReproducir) return;
        intentandoReproducir = true;
        videoElement
          .play()
          .then(() => {
            intentandoReproducir = false;
          })
          .catch(() => {
            intentandoReproducir = false;
          });
      }

      // DESTRUCCIÓN DE MEMORIA Y RECARGA
      function forzarLavadoRAM() {
        console.log("Iniciando lavado de RAM...");
        videoElement.pause();
        videoElement.removeAttribute("src");
        videoElement.load();
        setTimeout(() => {
          window.location.href =
            window.location.href.split("?")[0] + "?r=" + new Date().getTime();
        }, 500);
      }

      // LAVADO AUTOMÁTICO CADA 45 MINUTOS
      setInterval(forzarLavadoRAM, 2700000);

      videoElement.addEventListener("error", forzarLavadoRAM);
      videoElement.addEventListener("stalled", () => {
        videoElement.load();
        intentarReproducir();
      });
      document.addEventListener(
        "click",
        async () => {
          try {
            if ("wakeLock" in navigator)
              await navigator.wakeLock.request("screen");
          } catch (e) {}
        },
        { once: true },
      );

      function fetchSeguro(url, timeoutMs = 3000) {
        return Promise.race([
          fetch(url, { cache: "no-store" }),
          new Promise((_, r) =>
            setTimeout(() => r(new Error("Timeout")), timeoutMs),
          ),
        ]);
      }

      async function obtenerFechaReal() {
        try {
          const res1 = await fetchSeguro(
            "https://timeapi.io/api/Time/current/zone?timeZone=America/El_Salvador",
          );
          if (res1.ok) {
            const data = await res1.json();
            return { getHours: () => data.hour, getMinutes: () => data.minute };
          }
          throw new Error("API 1 falló");
        } catch (error1) {
          try {
            const res2 = await fetchSeguro(
              "https://worldtimeapi.org/api/timezone/America/El_Salvador",
            );
            if (res2.ok) {
              const data2 = await res2.json();
              const svTime = new Date(data2.unixtime * 1000 - 6 * 3600000);
              return {
                getHours: () => svTime.getUTCHours(),
                getMinutes: () => svTime.getUTCMinutes(),
              };
            }
            throw new Error("API 2 falló");
          } catch (error2) {
            // PLAN C: Si no hay red al arrancar, usa el reloj local de la TV para evitar pantalla negra
            console.warn("Sin APIs de tiempo. Usando reloj local.");
            const localDate = new Date();
            return {
              getHours: () => localDate.getHours(),
              getMinutes: () => localDate.getMinutes(),
            };
          }
        }
      }

      async function cargarPlaylist() {
        try {
          const response = await fetch(
            URL_PLAYLIST + "?t=" + new Date().getTime(),
            { cache: "no-store" },
          );
          if (!response.ok) return;
          let data;
          try {
            data = await response.json();
          } catch (e) {
            return;
          }

          const ahora = await obtenerFechaReal();
          const horaActual =
            String(ahora.getHours()).padStart(2, "0") +
            ":" +
            String(ahora.getMinutes()).padStart(2, "0");

          let videoEncontrado = "";

          if (data && data.programacion) {
            for (let i = 0; i < data.programacion.length; i++) {
              let turno = data.programacion[i];
              if (horaActual >= turno.inicio && horaActual <= turno.fin) {
                videoEncontrado = turno.url;
                break;
              }
            }
          }

          if (videoEncontrado) {
            if (currentUrl === "") {
              currentUrl = videoEncontrado;
              // EL TRUCO VITAL RESTAURADO: Obliga a la TV a saltarse el caché corrupto
              videoElement.src = currentUrl + "?update=" + new Date().getTime();
              videoElement.load();
              intentarReproducir();
            } else if (videoEncontrado !== currentUrl) {
              forzarLavadoRAM();
            } else {
              try {
                const resHead = await fetch(
                  currentUrl + "?check=" + new Date().getTime(),
                  { method: "HEAD", cache: "no-store" },
                );
                if (resHead.ok) {
                  const modificado = resHead.headers.get("Last-Modified");
                  if (modificado) {
                    if (!ultimaModificacion) {
                      ultimaModificacion = modificado;
                    } else if (ultimaModificacion !== modificado) {
                      forzarLavadoRAM();
                    }
                  }
                }
              } catch (e) {}
            }
          }
        } catch (error) {
        } finally {
          setTimeout(cargarPlaylist, 30000);
        }
      }

      setInterval(() => {
        if (videoElement.paused && videoElement.src) intentarReproducir();
      }, 5000);
      cargarPlaylist();
    </script>
  </body>
</html>
