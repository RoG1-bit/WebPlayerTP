<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Reproductor P3 - Típicos Margoth</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; position: absolute; }
    </style>
</head>
<body>
    <video id="videoPlayer" muted playsinline loop></video>
    <script>
        const URL_PLAYLIST = 'https://project-cast.sfo3.cdn.digitaloceanspaces.com/pantalla-3/playlist_p3.json';
        const videoElement = document.getElementById('videoPlayer');
        let currentUrl = '';

        function obtenerFechaElSalvador() {
            const d = new Date();
            const utc = d.getTime() + (d.getTimezoneOffset() * 60000);
            const svTime = new Date(utc - (3600000 * 6)); 
            return {
                getHours: () => svTime.getUTCHours(),
                getMinutes: () => svTime.getUTCMinutes(),
                getTime: () => d.getTime() 
            };
        }

        async function cargarPlaylist() {
            try {
                const response = await fetch(URL_PLAYLIST + '?t=' + new Date().getTime());
                const data = await response.json();
                
                const ahora = obtenerFechaElSalvador();
                const horaActual = String(ahora.getHours()).padStart(2, '0') + ':' + String(ahora.getMinutes()).padStart(2, '0');
                
                let videoEncontrado = '';

                // Lógica simple para P3 (Asumiendo que el JSON solo tiene fijos.manana, fijos.mediodia y fijos.tarde)
                if (horaActual >= "00:00" && horaActual <= "10:29") {
                    videoEncontrado = data.fijos.manana;
                } 
                else if (horaActual >= "10:30" && horaActual <= "14:29") {
                    videoEncontrado = data.fijos.mediodia; 
                } 
                else if (horaActual >= "14:30" && horaActual <= "23:59") {
                    videoEncontrado = data.fijos.tarde;
                }

                if (videoEncontrado && videoEncontrado !== currentUrl) {
                    currentUrl = videoEncontrado;
                    const cacheBuster = '?update=' + ahora.getTime();
                    videoElement.src = currentUrl + cacheBuster;
                    videoElement.load();
                    videoElement.play().catch(() => {});
                }
            } catch (error) { console.error("Error P3:", error); }
        }

        setInterval(() => { if(videoElement.paused && videoElement.src) videoElement.play().catch(() => {}); }, 1000);
        setInterval(cargarPlaylist, 30000);
        cargarPlaylist();
    </script>
</body>
</html>
