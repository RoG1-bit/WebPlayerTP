<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Reproductor P3</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
        #videoPlayer { width: 100%; height: 100%; object-fit: cover; }
        #mensaje { color: white; position: absolute; top: 10px; left: 10px; font-family: sans-serif; display: none; }
    </style>
</head>
<body>

    <video id="videoPlayer" autoplay muted playsinline loop></video>
    <div id="mensaje">Cargando...</div>

    <script>
        const URL_PLAYLIST = 'https://project-cast.sfo3.cdn.digitaloceanspaces.com/playlist_p3.json';
        const videoElement = document.getElementById('videoPlayer');
        let currentUrl = '';

        async function cargarPlaylist() {
            try {
                // 1. Buscamos la "comanda" (el JSON)
                const response = await fetch(URL_PLAYLIST + '?t=' + new Date().getTime()); // Evita caché
                const data = await response.json();
                
                // 2. Verificamos qué hora es
                const ahora = new Date();
                const horaActual = String(ahora.getHours()).padStart(2, '0') + ':' + String(ahora.getMinutes()).padStart(2, '0');
                
                // 3. Buscamos el video que toca
                let videoEncontrado = null;
                
                data.programacion.forEach(item => {
                    if (horaActual >= item.inicio && horaActual <= item.fin) {
                        videoEncontrado = item.url;
                    }
                });

                // 4. Si encontramos video y es diferente al que está sonando, lo cambiamos
                if (videoEncontrado && videoEncontrado !== currentUrl) {
                    console.log("Cambiando video a: " + videoEncontrado);
                    currentUrl = videoEncontrado;
                    videoElement.src = currentUrl;
                    videoElement.play().catch(e => console.log("Error al reproducir (necesita interacción):", e));
                }

            } catch (error) {
                console.error("Error leyendo playlist:", error);
            }
        }

        // Revisar el horario cada 30 segundos
        setInterval(cargarPlaylist, 30000);
        // Cargar al iniciar
        cargarPlaylist();
    </script>
</body>
</html>
