<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pantalla 3 - Inteligencia por Perfiles (Optimizada)</title>
    <style>
      body,
      html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background-color: #1a1a1a;
        background-image: url("https://project-cast.sfo3.cdn.digitaloceanspaces.com/fondo.jpg");
        background-position: center;
        background-repeat: no-repeat;
        background-size: contain;
      }
      video {
        width: 100%;
        height: 100%;
        object-fit: cover;
        position: absolute;
        z-index: 5;
      }
    </style>
  </head>
  <body>
    <video id="videoPlayer" muted playsinline loop preload="auto"></video>

    <script>
      const URL_PLAYLIST =
        "https://project-cast.sfo3.cdn.digitaloceanspaces.com/playlist_p3.json";
      const videoElement = document.getElementById("videoPlayer");

      // --- IDENTIDAD DE LA SUCURSAL ---
      const urlParams = new URLSearchParams(window.location.search);
      const sucursalActual = urlParams.get("sucursal")
        ? urlParams.get("sucursal").toLowerCase()
        : "default";

      let currentUrl = "";
      let ultimaModificacion = "";
      let intentandoReproducir = false;

      function intentarReproducir() {
        if (intentandoReproducir) return;
        intentandoReproducir = true;
        videoElement
          .play()
          .then(() => {
            intentandoReproducir = false;
          })
          .catch(() => {
            intentandoReproducir = false;
          });
      }

      function lavarRAM() {
        videoElement.pause();
        videoElement.removeAttribute("src");
        videoElement.load();
        currentUrl = "";

        if (navigator.onLine) {
          setTimeout(() => {
            const params = new URLSearchParams(window.location.search);
            params.set("r", new Date().getTime());
            window.location.replace(
              window.location.origin +
                window.location.pathname +
                "?" +
                params.toString(),
            );
          }, 500);
        }
      }

      setInterval(lavarRAM, 2700000);

      videoElement.addEventListener("error", () => {
        setTimeout(lavarRAM, 3000);
      });
      videoElement.addEventListener("stalled", () => {
        videoElement.load();
        intentarReproducir();
      });
      document.addEventListener(
        "click",
        async () => {
          try {
            if ("wakeLock" in navigator)
              await navigator.wakeLock.request("screen");
          } catch (e) {}
        },
        { once: true },
      );

      function fetchSeguro(url, timeoutMs = 3000) {
        return Promise.race([
          fetch(url, { cache: "no-store" }),
          new Promise((_, r) =>
            setTimeout(() => r(new Error("Timeout")), timeoutMs),
          ),
        ]);
      }

      async function obtenerFechaReal() {
        try {
          const res1 = await fetchSeguro(
            "https://timeapi.io/api/Time/current/zone?timeZone=America/El_Salvador",
          );
          if (res1.ok) {
            const data = await res1.json();
            return { getHours: () => data.hour, getMinutes: () => data.minute };
          }
          throw new Error("API 1 falló");
        } catch (error1) {
          try {
            const res2 = await fetchSeguro(
              "https://worldtimeapi.org/api/timezone/America/El_Salvador",
            );
            if (res2.ok) {
              const data2 = await res2.json();
              const svTime = new Date(data2.unixtime * 1000 - 6 * 3600000);
              return {
                getHours: () => svTime.getUTCHours(),
                getMinutes: () => svTime.getUTCMinutes(),
              };
            }
            throw new Error("API 2 falló");
          } catch (error2) {
            const localDate = new Date();
            return {
              getHours: () => localDate.getHours(),
              getMinutes: () => localDate.getMinutes(),
            };
          }
        }
      }

      async function cargarPlaylist() {
        try {
          if (!navigator.onLine) throw new Error("Offline");

          const response = await fetch(
            URL_PLAYLIST + "?t=" + new Date().getTime(),
            { cache: "no-store" },
          );
          if (!response.ok) return;
          let data;
          try {
            data = await response.json();
          } catch (e) {
            return;
          }

          const ahora = await obtenerFechaReal();
          const horaActual =
            String(ahora.getHours()).padStart(2, "0") +
            ":" +
            String(ahora.getMinutes()).padStart(2, "0");

          let videoEncontrado = "";

          // CASCADA NIVEL 1: ¿Hay una excepción temporal para esta sucursal hoy?
          if (
            data.excepciones_temporales &&
            data.excepciones_temporales[sucursalActual]
          ) {
            for (let turno of data.excepciones_temporales[sucursalActual]) {
              if (horaActual >= turno.inicio && horaActual <= turno.fin) {
                videoEncontrado = turno.url;
                break;
              }
            }
          }

          // CASCADA NIVEL 2: Si no hay excepción, buscar el Perfil Asignado
          if (!videoEncontrado) {
            // Descubre a qué perfil pertenece esta sucursal (o usa 'default' si no está en la lista)
            let miPerfil =
              data.asignacion_perfiles &&
              data.asignacion_perfiles[sucursalActual]
                ? data.asignacion_perfiles[sucursalActual]
                : "default";

            // Busca los horarios de ese perfil
            let horariosPerfil =
              data.perfiles[miPerfil] || data.perfiles["default"];

            for (let turno of horariosPerfil) {
              if (horaActual >= turno.inicio && horaActual <= turno.fin) {
                videoEncontrado = turno.url;
                break;
              }
            }
          }

          // REPRODUCCIÓN Y ANTI-CACHÉ
          if (videoEncontrado) {
            if (currentUrl === "") {
              currentUrl = videoEncontrado;
              
              // 🚨🚨 OPTIMIZACIÓN 1: URL LIMPIA SIN CACHÉ BUSTING 🚨🚨
              videoElement.src = currentUrl; 
              
              videoElement.load();
              intentarReproducir();
            } else if (videoEncontrado !== currentUrl) {
              lavarRAM();
            } else {
              try {
                const resHead = await fetch(
                  currentUrl + "?check=" + new Date().getTime(),
                  { method: "HEAD", cache: "no-store" },
                );
                if (resHead.ok) {
                  const modificado = resHead.headers.get("Last-Modified");
                  if (modificado) {
                    if (!ultimaModificacion) {
                      ultimaModificacion = modificado;
                    } else if (ultimaModificacion !== modificado) {
                      lavarRAM();
                    }
                  }
                }
              } catch (e) {}
            }
          }
        } catch (error) {
        } finally {
          // 🚨🚨 OPTIMIZACIÓN 2: RELAJAR CONSULTA A 10 MINUTOS 🚨🚨
          setTimeout(cargarPlaylist, 600000);
        }
      }

      setInterval(() => {
        if (videoElement.paused && videoElement.src && navigator.onLine)
          intentarReproducir();
      }, 5000);
      cargarPlaylist();
    </script>
  </body>
</html>
