<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pantalla 2 test</title>
    <style>
      /* Fondo corporativo de respaldo */
      body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #1a1a1a;
        background-image: url("https://pub-29979a9319a64459816c0aa2b9d4d11c.r2.dev/fondo.jpg");
        background-position: center; background-repeat: no-repeat; background-size: contain;
      }
      /* Reproductor de video */
      video { width: 100%; height: 100%; object-fit: cover; position: absolute; z-index: 5; background-color: transparent; }
    </style>
  </head>
  <body>
    <video id="videoPlayer" muted playsinline loop preload="auto"></video>

    <script>
      // ==========================================
      // 1. CONFIGURACIÓN DEL SISTEMA
      // ==========================================
      const URL_PLAYLIST = "https://pub-29979a9319a64459816c0aa2b9d4d11c.r2.dev/pantalla2test/playlist_p2test.json";
      const videoElement = document.getElementById("videoPlayer");

      // Identificador de sucursal
      const urlParams = new URLSearchParams(window.location.search);
      const sucursalActual = urlParams.get("sucursal") ? urlParams.get("sucursal").toLowerCase() : "general";

      let currentUrl = "";
      let intentandoReproducir = false;

      // ==========================================
      // 2. NÚCLEO DE PROTECCIÓN Y REPRODUCCIÓN
      // ==========================================
      function intentarReproducir() {
        if (intentandoReproducir) return;
        intentandoReproducir = true;
        videoElement.play().then(() => { intentandoReproducir = false; }).catch(() => { intentandoReproducir = false; });
      }

      // Reinicio seguro: Limpia la memoria de la TV
      function lavarRAM() {
        videoElement.pause();
        videoElement.removeAttribute("src");
        videoElement.load();
        currentUrl = "";

        if (navigator.onLine) {
          setTimeout(() => {
            const params = new URLSearchParams(window.location.search);
            params.set("r", new Date().getTime());
            window.location.replace(window.location.origin + window.location.pathname + "?" + params.toString());
          }, 500);
        }
      }

      // Sistema de Auto-Rescate Universal (A prueba de Samsung, LG y Android)
      videoElement.addEventListener("error", () => { setTimeout(lavarRAM, 15000); });
      // Evento 'stalled' eliminado intencionalmente para evitar bucles en Tizen OS.

      document.addEventListener("click", async () => { try { if ("wakeLock" in navigator) await navigator.wakeLock.request("screen"); } catch (e) {} }, { once: true });

      function fetchSeguro(url, timeoutMs = 20000) {
        return Promise.race([ fetch(url, { cache: "no-store" }), new Promise((_, r) => setTimeout(() => r(new Error("Timeout")), timeoutMs)) ]);
      }

     // ==========================================
      // 3. RELOJ MAESTRO Y CÁLCULO DE SEMANAS
      // ==========================================
      
      let offsetReloj = null; // Memoria para guardar el atraso de la TV

      async function obtenerFechaReal() {
        const horaTV_UTC = new Date().getTime();

        try {
          const res1 = await fetchSeguro("https://timeapi.io/api/Time/current/zone?timeZone=America/El_Salvador", 10000);
          if (res1.ok) {
            const data = await res1.json();
            // Calculamos el tiempo real y guardamos la diferencia con la TV
            const realUTC = Date.UTC(data.year, data.month - 1, data.day, data.hour, data.minute, data.seconds) + (6 * 3600000);
            offsetReloj = realUTC - horaTV_UTC;
            return formatSVTime(realUTC);
          } throw new Error("API 1");
        } catch (error1) {
          try {
            const res2 = await fetchSeguro("https://worldtimeapi.org/api/timezone/America/El_Salvador", 10000);
            if (res2.ok) {
              const data2 = await res2.json();
              const realUTC = data2.unixtime * 1000;
              offsetReloj = realUTC - horaTV_UTC;
              return formatSVTime(realUTC);
            } throw new Error("API 2");
          } catch (error2) {
            // ====================================================
            // SOLUCIÓN B: EL RASTREADOR DE DESFASE
            // ====================================================
            // Tomamos la hora mentirosa de la TV y le sumamos los minutos de error que descubrimos antes.
            const currentRealUTC = horaTV_UTC + (offsetReloj || 0);
            return formatSVTime(currentRealUTC);
          }
        }
      }

      function formatSVTime(utcEpoch) {
        // Convertimos cualquier tiempo a GMT-6 exacto, sin importar la TV
        const d = new Date(utcEpoch - (6 * 3600000));
        return {
          getFullYear: () => d.getUTCFullYear(),
          getMonth: () => d.getUTCMonth(),
          getDate: () => d.getUTCDate(),
          getDay: () => d.getUTCDay(),
          getHours: () => d.getUTCHours(),
          getMinutes: () => d.getUTCMinutes()
        };
      }

      // Calcula automáticamente si estamos en la Quincena 1 (S1) o Quincena 2 (S2)
      function obtenerTipoSemana(ahora) {
        const diaSemana = ahora.getDay();
        const diasParaRestar = diaSemana === 0 ? 6 : diaSemana - 1;
        const hoyUTC = Date.UTC(ahora.getFullYear(), ahora.getMonth(), ahora.getDate());
        const lunesActualUTC = hoyUTC - diasParaRestar * 24 * 60 * 60 * 1000;
        return Math.floor((lunesActualUTC - Date.UTC(2026, 1, 9)) / (1000 * 60 * 60 * 24 * 7)) % 2 === 0 ? "S1" : "S2";
      }

      // ==========================================
      // 4. CEREBRO DE TOMA DE DECISIONES
      // ==========================================
      async function cargarPlaylist() {
        try {
          if (!navigator.onLine) throw new Error("Offline");

          const response = await fetch(URL_PLAYLIST + "?t=" + new Date().getTime(), { cache: "no-store" });
          if (!response.ok) return;
          let data;
          try { data = await response.json(); } catch (e) { return; }

          const ahora = await obtenerFechaReal();
          const horaActual = String(ahora.getHours()).padStart(2, "0") + ":" + String(ahora.getMinutes()).padStart(2, "0");
          let dia = ahora.getDay(); if (dia === 0) dia = 7;
          const tipoSemana = obtenerTipoSemana(ahora);
          let videoEncontrado = "";

          // --- MATEMÁTICA DE TURNOS ---
          if (horaActual >= "00:00" && horaActual <= "10:59") {
            // 1. Prioridad Alta: Excepciones de fin de semana (Buffet)
            if (data.excepciones_manana && data.excepciones_manana[sucursalActual] && data.excepciones_manana[sucursalActual][dia]) {
              videoEncontrado = data.excepciones_manana[sucursalActual][dia];
            } 
            // 2. Prioridad Media: Desayunos Exclusivos
            else if (data.desayuno_exclusivo && data.desayuno_exclusivo[sucursalActual]) {
              videoEncontrado = data.desayuno_exclusivo[sucursalActual];
            }
            // 3. Prioridad Baja: Desayuno Nacional
            else {
              videoEncontrado = data.fijos.manana;
            }
          } else if (horaActual >= "11:00" && horaActual <= "13:59") {
            let almuerzoHoy = tipoSemana === "S1" ? data.almuerzos_s1[dia] : data.almuerzos_s2[dia];
            videoEncontrado = almuerzoHoy ? almuerzoHoy : data.fijos.manana;
          } else if (horaActual >= "14:00" && horaActual <= "23:59") {
            videoEncontrado = data.fijos.tarde;
          }

          // --- MOTOR DE REPRODUCCIÓN (Anti-Bloqueos) ---
          if (videoEncontrado) {
            
            if (currentUrl === "") {
              // Arranque inicial: Sello de tiempo para burlar la lista negra de televisores viejos
              currentUrl = videoEncontrado;
              videoElement.src = currentUrl + "?v=" + new Date().getTime(); 
              videoElement.load();
              intentarReproducir();
            
            } else if (currentUrl !== videoEncontrado) {
              // Cambio de turno programado: Reinicio limpio de página
              lavarRAM();
            }
            // Si es el mismo video, recicla desde la memoria local.
          }
          
        } catch (error) {
          // Reintento silencioso en 15 segundos si el router falló
          setTimeout(cargarPlaylist, 15000);
          return;
        }
        
        // Modo Precisión: Chequea turno cada 5 minutos (300,000 ms)
        setTimeout(cargarPlaylist, 300000);
      }

      // ==========================================
      // 5. RUTINAS DE MANTENIMIENTO Y WATCHDOG
      // ==========================================
      
      setInterval(() => { if (videoElement.paused && videoElement.src && navigator.onLine) intentarReproducir(); }, 5000);
      
      // Limpieza profunda de RAM cada 4 horas
      setInterval(lavarRAM, 14400000);

      // --- EL PERRO GUARDIÁN (Watchdog Anti-Congelamiento) ---
      let ultimoTiempoVideo = -1;
      let alertasCongelamiento = 0;

      setInterval(() => {
        if (currentUrl !== "" && !videoElement.paused) {
          let tiempoActual = videoElement.currentTime;

          // Tolerancia para TV LG
          if (tiempoActual === ultimoTiempoVideo && tiempoActual > 0) {
            alertasCongelamiento++;
            if (alertasCongelamiento === 1) {
              videoElement.load();
              intentarReproducir();
            } else if (alertasCongelamiento >= 2) {
              lavarRAM();
            }
          } else {
            alertasCongelamiento = 0;
          }
          ultimoTiempoVideo = tiempoActual;
        }
      }, 20000);

      cargarPlaylist();
    </script>
  </body>
</html>
